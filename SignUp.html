<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up</title>
        <link rel="stylesheet" href="styles.css">    
    </head>
    <body>
        <div class="main">
        <h1>Sign Up</h1>
        <form action="">
            <label for="userid">First Name:</label>
            <input type="text" id="first" name="userid" placeholder="Enter First Name" required>
            
            <label for="password">Last Name:</label>
            <input type="text" id="last" name="password" placeholder="Enter Last Name" required>

            <label for="userid">User Id:</label>
            <input type="text" id="userid" name="userid" placeholder="Enter UserId" required>

            <label for="password">Password:</label>
            <input type="text" id="password" name="password" placeholder="Enter Password" required>
            
            <div class="submit">
                <button type="submit"> Submit</button>
            </div>
            <p>
                <a href="LoginPage.html" class="button-style">Log In</a>
            </p>
        </form>
    </div>
    </body>
</html>
